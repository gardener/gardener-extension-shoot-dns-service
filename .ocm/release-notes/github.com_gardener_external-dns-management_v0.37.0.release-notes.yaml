  type: standard
- audience: operator
  author:
    hostname: github.com
    type: githubUser
    username: MartinWeindel
  category: bugfix
  contents: The `dnsprovider-replication` controller no longer replicates DNSProvider
    objects that carry a foreign dns.gardener.cloud/class annotation. Previously,
    such providers were copied to the target cluster and then instantly deleted, leading
    to avoidable processing.
  mimetype: text/markdown
  reference: '[#804](https://github.com/gardener/external-dns-management/pull/804)'
  type: standard
